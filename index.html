<!DOCTYPE html>
<html lang="en"><head>
    <meta charset="UTF-8">
    <title>Core Score</title>

    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>

    <style>
        body {
            color:rgb(0, 0, 0);

            max-width: 400px;

            border: 1px solid ;

            background-color: #c5bdff;;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);

        h2 {
            text-align: center;
            color: #8d7eff;
        }

            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #f2f2f2;
            border: 1px solid ;
            border-radius: 5px;
            font-size: 16px;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: #8d7eff;
            color: white;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #8d7eff;
            background-color: black;
        }

        p {
            font-size: 16px;
            margin-top: 10px;
        }

        #average, #result {
            font-weight: bold;
            color: #c5bdff;
        }
    </style>
</head>
<body>

    <h2>Core Score</h2>

    <p></p>

    <p>Math:</p>
    <input id="math" type="text">

    <p>English:</p>
    <input id="english" type="text">

    <p>Science:</p>
    <input id="science" type="text">

    <p>Social Studies:</p>
    <input id="socialstudies" type="text">

     <p>ICT:</p>
    <input id="ict" type="text">

    <button py-click="compute_average">Compute</button>

    <p>Average: <span id="average"></span></p>
